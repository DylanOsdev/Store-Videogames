# ---------------------------------------------------------------------------
# Reverse proxy de producción CON TLS.
#
# Se activa con el override docker-compose.tls.yml, que monta este archivo
# ENCIMA de conf.d/app.conf (reemplazándolo) y aporta los certificados.
#
#   docker compose -f docker-compose.prod.yml -f docker-compose.tls.yml up -d
#
# Reparte el tráfico igual que la versión HTTP, pero:
#   - Puerto 80  : redirige TODO a HTTPS (y sirve el reto ACME de certbot).
#   - Puerto 443 : termina TLS y hace el proxy real.
# $scheme vale 'https' aquí, así que Django (SECURE_PROXY_SSL_HEADER) sabe que
# la petición original fue segura.
# ---------------------------------------------------------------------------

upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:4321;
}

# --- HTTP: redirección a HTTPS (+ reto ACME para Let's Encrypt) --------------
server {
    listen 80;
    server_name _;

    # Validación de dominio de certbot por método webroot. Solo es útil si
    # montas un volumen en /var/www/certbot (ver DEPLOY.md); si no, devuelve
    # 404 inofensivo y el resto redirige.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS: terminación TLS + proxy ------------------------------------------
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # Certificados: nombres compatibles con Let's Encrypt (fullchain/privkey).
    # En local los genera nginx/tls/generate-selfsigned.sh.
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # Configuración TLS moderna y segura.
    ssl_protocols              TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers  off;
    ssl_session_cache          shared:SSL:10m;
    ssl_session_timeout        1d;

    client_max_body_size 20M;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # --- Estáticos recolectados (admin, drf-spectacular, etc.) ---------------
    location ^~ /static/ {
        alias /vol/static/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # --- Media subida por el admin ------------------------------------------
    location ^~ /media/ {
        alias /vol/media/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
    }

    # --- Backend Django (API, admin, health) ---------------------------------
    location ~ ^/(api|admin|health)/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Ahora sí es https: Django lo lee de aquí para SECURE_SSL_REDIRECT.
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_redirect off;
    }

    # --- Frontend Astro (SSR) ------------------------------------------------
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_redirect off;
    }
}
