# ---------------------------------------------------------------------------
# Reverse proxy de producción.
#
# Punto único de entrada. Reparte el tráfico así:
#   - /static/  y /media/  : servidos DIRECTAMENTE por nginx desde volúmenes
#                            compartidos (mucho más eficiente que pasar por
#                            Python; además Django no sirve /media/ con
#                            DEBUG=False, así que esto es obligatorio).
#   - /api/ /admin/ /health/ : proxy a gunicorn/Django (backend).
#   - resto                  : proxy al servidor Astro SSR (frontend).
#
# El navegador habla SOLO con nginx (mismo origen) => no hay CORS.
#
# TLS: este server escucha en HTTP (80). En producción real se termina TLS
# aquí (añadiendo un server 443 con certificados, p.ej. con certbot) o en un
# balanceador por delante. $scheme refleja el esquema real recibido y se
# propaga a Django vía X-Forwarded-Proto.
# ---------------------------------------------------------------------------

upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:4321;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # --- Estáticos recolectados (admin, drf-spectacular, etc.) ---------------
    # collectstatic los escribe en el volumen compartido 'static_volume'.
    # '^~' garantiza prioridad sobre cualquier regex de location.
    location ^~ /static/ {
        alias /vol/static/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # --- Media subida por el admin (portadas de productos, etc.) -------------
    # Volumen compartido 'media_volume' escrito por el backend.
    location ^~ /media/ {
        alias /vol/media/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
    }

    # --- Backend Django (API, admin, health) ---------------------------------
    location ~ ^/(api|admin|health)/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Django (SECURE_PROXY_SSL_HEADER) usa esto para saber si la petición
        # original llegó por HTTPS.
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_redirect off;
    }

    # --- Frontend Astro (SSR) ------------------------------------------------
    # Cualquier otra ruta la renderiza el servidor Node de Astro.
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Soporte de upgrade por si Astro usa WebSocket/islas en streaming.
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_redirect off;
    }
}
